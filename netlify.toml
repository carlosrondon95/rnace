[build]
  base = "rnaceapp"
  command = "npm run config && npm run build"
  publish = "dist/rnaceapp/browser"

[build.environment]
  NODE_ENV = "development"

[[plugins]]
  package = "@netlify/angular-runtime"

# ====================================================================
# Headers para Service Worker y PWA
# ====================================================================

# Service Worker: NUNCA cachear, siempre servir la última versión
[[headers]]
  for = "/OneSignalSDKWorker.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/OneSignalSDKUpdaterWorker.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# Manifest PWA: caché corto para permitir actualizaciones
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"
