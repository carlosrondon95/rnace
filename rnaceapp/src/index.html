<!doctype html>
<html lang="en">

<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

  <meta charset="utf-8" />
  <title>RNACE</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="description" content="Centro RNACE" />

  <!-- Social Sharing (WhatsApp, Facebook, LinkedIn, etc) -->
  <meta property="og:title" content="RNACE" />
  <meta property="og:description" content="Centro RNACE" />
  <meta property="og:image" content="assets/icons/icon-512x512.png" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="RNACE" />
  <meta name="twitter:description" content="Centro RNACE" />
  <meta name="twitter:image" content="assets/icons/icon-512x512.png" />

  <meta name="theme-color" content="#32332f" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RNACE">
  <link rel="icon" type="image/png" href="assets/icons/icon-96x96.png" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">

  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.RNACEInitOneSignal = function(force) {
      if (window.OneSignalInitPromise && !force) {
        return window.OneSignalInitPromise;
      }

      var initPromise = new Promise(function(resolve, reject) {
        window.OneSignalDeferred.push(async function(OneSignal) {
          try {
            await OneSignal.init({
              appId: "40e80da3-452e-4482-81df-6b7bf447a9a1",
              safari_web_id: "web.onesignal.auto.2a0b8f88-f61f-4cbf-954f-aff96911a546",
              serviceWorkerPath: "OneSignalSDKWorker.js",
              serviceWorkerParam: { scope: "/" },
              autoResubscribe: true,
              notifyButton: {
                enable: false,
              },
              promptOptions: {
                slidedown: {
                  prompts: [
                    {
                      type: "push",
                      autoPrompt: false,
                      text: {
                        actionMessage: "Activa las notificaciones para recibir avisos de reservas y plazas libres.",
                        acceptButton: "Permitir",
                        cancelButton: "Ahora no"
                      }
                    }
                  ]
                }
              }
            });
            resolve(OneSignal);
          } catch (error) {
            console.error("[Push] Error inicializando OneSignal", error);
            if (window.OneSignalInitPromise === initPromise) {
              window.OneSignalInitPromise = undefined;
            }
            reject(error);
          }
        });
      });

      window.OneSignalInitPromise = initPromise;
      return initPromise;
    };

    window.RNACEInitOneSignal().catch(function() {});
  </script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
